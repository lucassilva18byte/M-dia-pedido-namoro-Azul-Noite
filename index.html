<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido Especial 💙</title>

<style>
:root{
  --azul1:#0a0f2c;
  --azul2:#111a44;
  --azul3:#1c2a6b;
  --azulGlow:#4da6ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,var(--azul1),var(--azul2),var(--azul3));
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  position:relative;
}

/* ESTRELAS */
.estrelas span{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0.6;
  animation:piscar 2s infinite alternate;
}

@keyframes piscar{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* CORAÇÕES MAIS SUAVES */
.coracoes span{
  position:absolute;
  font-size:14px;
  animation:subir 12s linear infinite;
  opacity:0.2;
}

@keyframes subir{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* CARD */
.card{
  background:rgba(10,15,44,0.85);
  backdrop-filter:blur(15px);
  padding:55px;
  width:90%;
  max-width:650px;
  border-radius:30px;
  border:1px solid rgba(77,166,255,0.5);
  box-shadow:
    0 0 40px rgba(77,166,255,0.4),
    0 20px 60px rgba(0,0,0,0.8);
  text-align:center;
}

h1{
  margin-bottom:25px;
  font-size:26px;
  background:linear-gradient(90deg,#8ec5ff,#ffffff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.texto{
  font-size:18px;
  min-height:120px;
  margin-bottom:20px;
  line-height:1.6;
}

.tap{
  font-size:12px;
  opacity:0.5;
}

button{
  padding:12px 28px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  margin:10px;
}

.sim{
  background:linear-gradient(90deg,#4da6ff,#8ec5ff);
  color:#0a0f2c;
}

.nao{
  background:#ffffff20;
  color:white;
  position:relative;
}

.final{
  font-size:22px;
  margin-top:20px;
  animation:fadeIn 1.5s ease forwards;
  opacity:0;
  background:linear-gradient(90deg,#4da6ff,#ffffff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

@keyframes fadeIn{
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="estrelas"></div>
<div class="coracoes"></div>

<div class="card">
  <h1>Em uma noite como essa... 💙</h1>
  <div class="texto" id="texto"></div>
  <div class="tap" id="tap">toque na tela ✨</div>
  <div id="botoes"></div>
  <div id="finalMsg"></div>
</div>

<script>

/* ESTRELAS */
const estrelas = document.querySelector(".estrelas");
for(let i=0;i<80;i++){
  let star=document.createElement("span");
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  estrelas.appendChild(star);
}

/* CORAÇÕES SUAVES */
const coracoes = document.querySelector(".coracoes");
for(let i=0;i<20;i++){
  let heart=document.createElement("span");
  heart.innerHTML="💙";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(10+Math.random()*6)+"s";
  coracoes.appendChild(heart);
}

/* FRASES MAIS EMOCIONAIS */
const frases=[
"Em uma noite como essa… algo mudou sem que eu percebesse.",
"Você entrou na minha vida de um jeito inesperado…",
"E quando eu vi… já não conseguia imaginar meus dias sem você.",
"Foi aí que eu entendi o quanto você se tornou importante pra mim…",
"E então eu preciso te perguntar algo…"
];

let index = 0;
let escrevendo = false;
let ativo = true;

const texto = document.getElementById("texto");
const botoes = document.getElementById("botoes");
const finalMsg = document.getElementById("finalMsg");
const tap = document.getElementById("tap");

/* DIGITAÇÃO MELHORADA */
function digitarFrase(frase){
    escrevendo = true;
    texto.innerHTML = "";
    let char = 0;

    function escrever(){
        if(char < frase.length){
            texto.innerHTML += frase.charAt(char);
            char++;
            setTimeout(escrever, 30);
        } else {
            escrevendo = false;
        }
    }
    escrever();
}

/* TOQUE NA TELA */
document.addEventListener("click", (e)=>{
    if(e.target.tagName === "BUTTON") return;
    if(!ativo) return;
    if(escrevendo) return;

    if(index < frases.length){
        digitarFrase(frases[index]);
        index++;
    } else {
        mostrarPedido();
        ativo = false;
    }
});

/* PEDIDO */
function mostrarPedido(){
    tap.style.display="none";
    texto.innerHTML = "Você aceita namorar comigo? 💙✨";

    botoes.innerHTML = `
        <button class="sim" onclick="aceitou()">SIM 💙</button>
        <button class="nao" onmouseover="fugir(this)">NÃO 😅</button>
    `;
}

/* BOTÃO NÃO FUGINDO */
function fugir(btn){
    btn.style.position="absolute";
    btn.style.top=Math.random()*200+"px";
    btn.style.left=Math.random()*200+"px";
}

/* FINAL MELHORADO */
function aceitou(){
    botoes.style.display="none";
    finalMsg.innerHTML="<div class='final'>Agora é oficial… 💙<br>Você é minha namorada ❤️</div>";
}

</script>

</body>
</html>
